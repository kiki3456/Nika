<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gênio do Futuro</title>
<style>
body {
    background: pink;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 80px;
}
button {
    background: #ff4fa3;
    color: white;
    border: none;
    padding: 18px 32px;
    font-size: 22px;
    border-radius: 40px;
    cursor: pointer;
}
#resultado {
    margin-top: 40px;
    font-size: 26px;
    font-weight: bold;
}
</style>
</head>
<body>

<button id="genioBtn">O GÊNIO QUE NUNCA ERRA</button>
<div id="resultado"></div>

<script>
document.getElementById("genioBtn").onclick = function() {
    document.getElementById("resultado").innerText = "José";
}
</script>

</body>
</html>
