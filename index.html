<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESSIAS GAME - BOLÍVIA INSANE EDITION</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            color: #f4d03f; 
            text-align: center;
            margin-bottom: 5px;
        }

        /* PAINEL DE STATUS TRICOLOR */
        .status-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            border: 2px solid #d52b1e; 
        }
        
        #level-display { color: #f4d03f; } 
        #timer-display { color: #d52b1e; font-size: 1.4rem; text-shadow: 0 0 5px #d52b1e; transition: color 0.2s; } 
        #score-display { color: #007934; } 

        /* TITO - O INSUPORTÁVEL */
        .mascot-container {
            display: flex;
            align-items: center;
            background: rgba(0, 121, 52, 0.15); 
            border-radius: 15px;
            padding: 15px;
            max-width: 550px;
            width: 100%;
            margin-bottom: 20px;
            border: 3px solid #007934; 
            box-shadow: 0 4px 15px rgba(0, 121, 52, 0.3);
        }

        .mascot-avatar {
            font-size: 3.5rem;
            margin-right: 15px;
            animation: violent-tremor 0.1s infinite alternate;
        }

        .mascot-bubble {
            background: #ffffff;
            color: #111;
            padding: 12px;
            border-radius: 10px;
            position: relative;
            font-size: 1rem;
            font-weight: bold;
            flex-grow: 1;
            border: 1px solid #f4d03f; 
        }

        .mascot-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 10px 10px 10px 0;
            border-style: solid;
            border-color: transparent #ffffff transparent transparent;
        }

        @keyframes violent-tremor {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -1px) rotate(2deg); }
        }

        /* TABULEIRO DO JOGO */
        .game-container {
            width: 100%;
            max-width: 650px;
            display: grid;
            gap: 10px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        /* CARTAS */
        .card {
            aspect-ratio: 3/4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .card.flipped, .card.matched {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 2px solid #f4d03f; 
            padding: 5px;
            text-align: center;
        }

        .card-back {
            background: linear-gradient(135deg, #d52b1e 0%, #007934 100%);
        }

        .card-back::before {
            content: "🇧🇴"; 
            font-size: 2.2rem;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        .card-front {
            background-color: #fff;
            color: #333;
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 2px;
        }

        .card-name {
            font-size: 0.75rem;
            font-weight: bold;
            color: #444;
            line-height: 1;
        }

        .card.matched .card-front {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .card.matched .card-name { color: #bbb; }

        /* BOTÃO DE DESISTÊNCIA */
        .btn {
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #d52b1e; 
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #b32015;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>MESSIAS GAME: MODO IMPREVISÍVEL</h1>
    </header>

    <div class="status-container">
        <div class="status-box">Nível: <span id="level-display">1</span>/10</div>
        <div class="status-box">Tempo: <span id="timer-display">60</span>s</div>
        <div class="status-box">Pontos: <span id="score-display">1000</span></div>
    </div>

    <div class="mascot-container">
        <div class="mascot-avatar">🦙</div>
        <div class="mascot-bubble" id="tito-speech">
            Aumentei seu tempo porque fiquei com pena dos seus dedos lentos. Mas ó: errou um par, eu devoro 3 segundos do seu relógio! Boa sorte.
        </div>
    </div>

    <main class="game-container" id="board"></main>

    <button class="btn" onclick="resetEntireGame()">Desistir de Vez</button>

    <script>
        const poolItems = [
            { icon: "🦙", name: "Lhama" },
            { icon: "🏔️", name: "Salar Uyuni" },
            { icon: "🥟", name: "Salteña" },
            { icon: "⛵", name: "Titicaca" },
            { icon: "👒", name: "Cholita" },
            { icon: "🎷", name: "Zampoña" },
            { icon: "🐆", name: "Beni Jaguar" },
            { icon: "🏳️‍🌈", name: "Wiphala" },
            { icon: "🥖", name: "Marraqueta" },
            { icon: "⛏️", name: "Potosí" }
        ];

        const titoInsults = [
            "PATÉTICO! Errou e ainda perdeu 3 segundos no relógio! Olha o desespero!",
            "Errou de novo. Além de perder pontos, tá ficando sem tempo. Anda rápido!",
            "Eita jogada feia! Só de olhar para esse erro eu tirei tempo do seu cronômetro por puro capricho.",
            "Tão lento que o tempo tá evaporando igual a água no Salar de Uyuni.",
            "Você é a prova viva de que clicar rápido não significa clicar certo. Menos 3 segundos para você aprender!"
        ];

        const titoWinLevel = [
            "Passou... Que milagre. Mas no próximo nível o tempo inicial é menor e meus roubos de segundos continuam ativos!",
            "Avançou de nível, mas sua pontuação continua uma piada de mau gosto.",
            "Uau, o gênio achou os pares. Vamos ver se você é rápido o bastante agora."
        ];

        // NOVO AJUSTE DE TEMPO: Mais justo no início, mas pune erros severamente
        const levelConfig = {
            1:  { pairs: 8,  cols: 4, time: 60 }, // 60 segundos iniciais para respirar
            2:  { pairs: 8,  cols: 4, time: 52 },
            3:  { pairs: 8,  cols: 4, time: 45 },
            4:  { pairs: 9,  cols: 6, time: 45 }, // Tabuleiro expande
            5:  { pairs: 9,  cols: 6, time: 40 },
            6:  { pairs: 9,  cols: 6, time: 35 },
            7:  { pairs: 10, cols: 5, time: 35 }, // Tabuleiro máximo
            8:  { pairs: 10, cols: 5, time: 30 },
            9:  { pairs: 10, cols: 5, time: 27 },
            10: { pairs: 10, cols: 5, time: 25 } // 25 segundos + roubos de tempo = Puro suco do caos
        };

        let currentLevel = 1;
        let score = 1000;
        let timeLeft;
        let timerInterval;
        
        let cardData = [];
        let firstCard, secondCard;
        let hasFlippedCard = false;
        let lockBoard = false;
        let matchesFound = 0;

        function playErrorSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(130, ctx.currentTime);
                
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) { console.log("Áudio não suportado"); }
        }

        const board = document.getElementById('board');
        const levelText = document.getElementById('level-display');
        const timerText = document.getElementById('timer-display');
        const scoreText = document.getElementById('score-display');
        const titoSpeech = document.getElementById('tito-speech');

        function startLevel() {
            clearInterval(timerInterval);
            const config = levelConfig[currentLevel];
            
            levelText.textContent = currentLevel;
            timeLeft = config.time;
            timerText.textContent = timeLeft;
            matchesFound = 0;
            resetTurn();

            board.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

            let selectedItems = poolItems.slice(0, config.pairs);
            cardData = [...selectedItems, ...selectedItems];
            
            shuffle();
            renderBoard();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.textContent = timeLeft;
                if (timeLeft <= 0) {
                    gameOverTimeOut();
                }
            }, 1000);
        }

        function shuffle() {
            for (let i = cardData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardData[i], cardData[j]] = [cardData[j], cardData[i]];
            }
        }

        function renderBoard() {
            board.innerHTML = "";
            cardData.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.name = item.name;
                card.innerHTML = `
                    <div class="card-front">
                        <div class="card-icon">${item.icon}</div>
                        <div class="card-name">${item.name}</div>
                    </div>
                    <div class="card-back"></div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkMatch();
        }

        function checkMatch() {
            const isMatch = firstCard.dataset.name === secondCard.dataset.name;
            if (isMatch) {
                score += 100;
                matchesFound++;
                scoreText.textContent = score;
                disableCards();
                
                if (matchesFound === levelConfig[currentLevel].pairs) {
                    nextLevel();
                }
            } else {
                score -= 100;
                scoreText.textContent = score;
                lockBoard = true;
                
                // --- A NOVA REGRINHA DO TITIO TITO ---
                // Retira 3 segundos do tempo restante imediatamente se o tempo for maior que 3
                timeLeft = Math.max(0, timeLeft - 3); 
                timerText.textContent = timeLeft;
                
                // Pisca o painel de tempo em vermelho vivo ao perder segundos
                timerText.style.color = '#ffffff';
                setTimeout(() => { timerText.style.color = '#d52b1e'; }, 200);
                
                playErrorSound();
                titoSpeech.textContent = titoInsults[Math.floor(Math.random() * titoInsults.length)];
                
                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetTurn();
                }, 1800); 
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetTurn();
        }

        function resetTurn() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function nextLevel() {
            clearInterval(timerInterval);
            if (currentLevel < 10) {
                currentLevel++;
                titoSpeech.textContent = titoWinLevel[Math.floor(Math.random() * titoWinLevel.length)];
                setTimeout(startLevel, 1200);
            } else {
                titoSpeech.innerHTML = `🚨 <b>NÃO PODE SER...</b> Você é rápido de verdade. Passou do nível 10 e lidou com o roubo de tempo terminando com <b>${score} pontos</b>. Desligo meu motor de injúrias aqui.`;
                board.innerHTML = "<h2 style='grid-column: 1/-1; text-align:center; color:#007934;'>👑 VOCÊ COMPLETOU O SUPREMO MESSIAS GAME!</h2>";
            }
        }

        function gameOverTimeOut() {
            clearInterval(timerInterval);
            score = 0;
            currentLevel = 1;
            scoreText.textContent = score;
            titoSpeech.innerHTML = "💥 <b>O TEMPO EVAPOROU!</b> Muito erro e pouca precisão. Volte pro nível 1 para eu ver se você aprende a clicar direito!";
            startLevel();
        }

        function resetEntireGame() {
            currentLevel = 1;
            score = 1000;
            scoreText.textContent = score;
            titoSpeech.textContent = "Apertou o botão de pânico? Sabia. De volta ao início.";
            startLevel();
        }

        startLevel();
    </script>
</body>
</html>
