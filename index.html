<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaza Organização</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fff7fb;
      --card: #ffffffcc;
      --text: #5f4b63;
      --muted: #8e7d92;
      --pink: #ffb6d9;
      --pink-strong: #ff8fc3;
      --lavender: #d9c6ff;
      --mint: #c8f5e8;
      --line: #f1d9e8;
      --shadow: 0 10px 25px rgba(233, 168, 204, 0.18);
      --radius: 24px;
    }

    body.dark {
      --bg: #17131f;
      --card: #241c31ee;
      --text: #f8edff;
      --muted: #c7b8d1;
      --pink: #ff9ccc;
      --pink-strong: #ff72b5;
      --lavender: #b99cff;
      --mint: #94dfc7;
      --line: #3c304a;
      --shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,182,217,.35), transparent 20%),
        radial-gradient(circle at top right, rgba(217,198,255,.35), transparent 20%),
        linear-gradient(180deg, var(--bg), #fff0f7);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .header {
      padding: 24px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      font-size: 28px;
    }

    h1, h2 {
      font-family: 'Baloo 2', cursive;
      margin: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .search,
    .note-input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      background: rgba(255,255,255,.7);
      color: var(--text);
    }

    body.dark .search,
    body.dark .note-input,
    body.dark textarea {
      background: rgba(255,255,255,.04);
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink-strong), var(--lavender));
      color: white;
    }

    .btn-soft {
      background: rgba(255,255,255,.65);
      border: 1px solid var(--line);
      color: var(--text);
    }

    body.dark .btn-soft {
      background: rgba(255,255,255,.05);
    }

    .new-note {
      padding: 20px;
      margin-bottom: 18px;
    }

    .new-note-grid {
      display: grid;
      gap: 12px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .notes {
      display: grid;
      gap: 14px;
    }

    .note {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .note-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      accent-color: var(--pink-strong);
      margin-top: 4px;
      cursor: pointer;
    }

    .note.done {
      opacity: 0.7;
    }

    .note.done .note-title {
      text-decoration: line-through;
    }

    .note-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .empty {
      text-align: center;
      padding: 28px;
      color: var(--muted);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 18px;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header card">
      <div class="brand">
        <div class="logo">🎀</div>
        <div>
          <h1>Zaza</h1>
          <div class="muted">Bloco de notas fofo para organizar a mente ✨</div>
        </div>
      </div>

      <button class="btn btn-soft" id="themeBtn">🌙 Modo escuro</button>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" class="search" placeholder="Buscar nota..." />
      <button class="btn btn-primary" id="clearDoneBtn">Limpar concluídas</button>
      <button class="btn btn-soft" id="clearAllBtn">Apagar tudo</button>
    </div>

    <div class="new-note card">
      <h2>Nova nota</h2>
      <div class="new-note-grid" style="margin-top: 14px;">
        <input type="text" id="titleInput" class="note-input" placeholder="Título da nota..." />
        <textarea id="contentInput" placeholder="Escreva aqui sua nota, ideia, tarefa ou lembrete..."></textarea>
        <button class="btn btn-primary" id="addNoteBtn">Salvar nota</button>
      </div>
    </div>

    <div id="notesList" class="notes"></div>

    <div class="footer">
      Feito com localStorage, açúcar visual e zero backend 💗
    </div>
  </div>

  <script>
    const STORAGE_KEY = "zaza-notas-simples";

    const notesList = document.getElementById("notesList");
    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");
    const searchInput = document.getElementById("searchInput");
    const addNoteBtn = document.getElementById("addNoteBtn");
    const themeBtn = document.getElementById("themeBtn");
    const clearDoneBtn = document.getElementById("clearDoneBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");

    let state = loadState();

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {
        theme: "light",
        notes: []
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyTheme() {
      document.body.classList.toggle("dark", state.theme === "dark");
      themeBtn.textContent = state.theme === "dark" ? "☀️ Modo claro" : "🌙 Modo escuro";
    }

    function renderNotes() {
      const term = searchInput.value.toLowerCase().trim();

      const filtered = state.notes.filter(note =>
        note.title.toLowerCase().includes(term) ||
        note.content.toLowerCase().includes(term)
      );

      if (filtered.length === 0) {
        notesList.innerHTML = `<div class="card empty">Nenhuma nota encontrada 🌷</div>`;
        return;
      }

      notesList.innerHTML = filtered.map(note => `
        <div class="note card ${note.done ? "done" : ""}">
          <div class="note-top">
            <div class="note-left">
              <input type="checkbox" class="checkbox" ${note.done ? "checked" : ""} onchange="toggleDone('${note.id}')">
              <div>
                <div class="note-title"><strong>${escapeHTML(note.title || "Sem título")}</strong></div>
                <div>${escapeHTML(note.content)}</div>
                <div class="mini">Criado em ${new Date(note.createdAt).toLocaleString("pt-BR")}</div>
              </div>
            </div>

            <div class="note-actions">
              <button class="btn btn-soft" onclick="editNote('${note.id}')">✏️</button>
              <button class="btn btn-soft" onclick="deleteNote('${note.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function addNote() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!content && !title) return;

      state.notes.unshift({
        id: crypto.randomUUID(),
        title,
        content,
        done: false,
        createdAt: new Date().toISOString()
      });

      titleInput.value = "";
      contentInput.value = "";
      saveState();
      renderNotes();
    }

    function deleteNote(id) {
      if (!confirm("Excluir esta nota?")) return;
      state.notes = state.notes.filter(note => note.id !== id);
      saveState();
      renderNotes();
    }

    function toggleDone(id) {
      state.notes = state.notes.map(note =>
        note.id === id ? { ...note, done: !note.done } : note
      );
      saveState();
      renderNotes();
    }

    function editNote(id) {
      const note = state.notes.find(n => n.id === id);
      if (!note) return;

      const newTitle = prompt("Editar título:", note.title);
      if (newTitle === null) return;

      const newContent = prompt("Editar conteúdo:", note.content);
      if (newContent === null) return;

      note.title = newTitle.trim();
      note.content = newContent.trim();

      saveState();
      renderNotes();
    }

    function clearDone() {
      if (!confirm("Remover todas as notas concluídas?")) return;
      state.notes = state.notes.filter(note => !note.done);
      saveState();
      renderNotes();
    }

      if (!confirm("Ap
